<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Red Flag AI Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      width: 340px;
      background: #07070f;
      color: #f9fafb;
    }

    .header {
      background: #0f0f1a;
      border-bottom: 1px solid #1f2937;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title { font-size: 14px; font-weight: 700; color: #fff; }
    .header-sub { font-size: 11px; color: #6b7280; margin-top: 1px; }

    .body { padding: 16px; }

    /* Setup screen */
    #setup { display: none; }
    .label { font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .input {
      width: 100%; padding: 8px 10px; border-radius: 8px;
      border: 1px solid #374151; background: #111827;
      color: #f9fafb; font-size: 12px; font-family: monospace;
      outline: none;
    }
    .input:focus { border-color: #dc2626; }
    .hint { font-size: 11px; color: #6b7280; margin-top: 6px; }
    .hint a { color: #f87171; text-decoration: none; }

    /* Scan screen */
    #scan { display: none; }
    .url-display {
      background: #111827; border: 1px solid #1f2937;
      border-radius: 8px; padding: 8px 10px;
      font-size: 11px; color: #9ca3af; font-family: monospace;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 12px;
    }

    .btn {
      width: 100%; padding: 10px; border-radius: 8px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #dc2626; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #b91c1c; }
    .btn-secondary {
      background: transparent; color: #9ca3af;
      border: 1px solid #374151; font-size: 12px;
      padding: 7px; margin-top: 8px;
    }
    .btn-secondary:hover { background: #111827; color: #f9fafb; }

    /* Results */
    #results { display: none; }
    .score-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .score-num { font-size: 40px; font-weight: 800; }
    .score-label { font-size: 12px; font-weight: 600; margin-top: 2px; }
    .score-sub { font-size: 11px; color: #6b7280; }

    .ring {
      width: 72px; height: 72px; border-radius: 50%;
      border: 5px solid #374151; display: flex;
      align-items: center; justify-content: center;
      flex-direction: column;
    }
    .ring-inner { font-size: 22px; font-weight: 800; line-height: 1; }
    .ring-sub { font-size: 9px; color: #9ca3af; }

    .flags { margin-top: 4px; }
    .flag {
      background: #111827; border: 1px solid #1f2937;
      border-radius: 8px; padding: 10px; margin-bottom: 8px;
    }
    .flag-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .flag-title { font-size: 12px; font-weight: 600; color: #f9fafb; }
    .badge {
      font-size: 9px; font-weight: 700; padding: 2px 6px;
      border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .badge-high { background: #450a0a; color: #f87171; }
    .badge-medium { background: #451a03; color: #fb923c; }
    .badge-low { background: #052e16; color: #4ade80; }
    .flag-desc { font-size: 11px; color: #9ca3af; line-height: 1.4; }
    .flag-fix { font-size: 11px; color: #4ade80; margin-top: 6px; border-top: 1px solid #1f2937; padding-top: 6px; }
    .flag-fix-label { font-size: 10px; font-weight: 700; color: #22c55e; margin-bottom: 2px; }

    .no-flags {
      text-align: center; padding: 20px;
      background: #052e16; border: 1px solid #14532d;
      border-radius: 8px;
    }
    .no-flags-icon { font-size: 28px; margin-bottom: 6px; }
    .no-flags-text { font-size: 13px; font-weight: 600; color: #4ade80; }
    .no-flags-sub { font-size: 11px; color: #16a34a; margin-top: 2px; }

    .loading {
      text-align: center; padding: 30px 16px;
      font-size: 13px; color: #6b7280;
    }
    .loading-dot {
      display: inline-block; animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .error-msg {
      background: #450a0a; border: 1px solid #7f1d1d;
      border-radius: 8px; padding: 10px; font-size: 12px; color: #fca5a5;
      margin-bottom: 10px;
    }

    .view-link {
      display: block; text-align: center; margin-top: 10px;
      font-size: 11px; color: #f87171; text-decoration: none;
    }
    .view-link:hover { text-decoration: underline; }

    .change-key { font-size: 10px; color: #4b5563; cursor: pointer; text-align: right; margin-bottom: 8px; }
    .change-key:hover { color: #9ca3af; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">🚩 Red Flag AI Pro</div>
    <div class="header-sub">Compliance Scanner</div>
  </div>
</div>

<div class="body">

  <!-- Setup screen: enter API key -->
  <div id="setup">
    <div class="label">API Key (Sentinel plan)</div>
    <input id="apiKeyInput" class="input" type="password" placeholder="rfp_your_api_key_here" />
    <div class="hint">
      Get your key at <a href="https://redflagaipro.com/settings" target="_blank">redflagaipro.com/settings</a>.<br>
      Requires Sentinel plan.
    </div>
    <button class="btn btn-primary" id="saveKeyBtn" style="margin-top: 12px;">Save key and scan</button>
  </div>

  <!-- Scan screen -->
  <div id="scan">
    <div id="changeKey" class="change-key">Change API key</div>
    <div id="urlDisplay" class="url-display"></div>
    <button class="btn btn-primary" id="scanBtn">Scan this page →</button>
    <button class="btn btn-secondary" id="openDashBtn">Open dashboard</button>
  </div>

  <!-- Loading -->
  <div id="loading" style="display:none;">
    <div class="loading">
      Scanning<span class="loading-dot">.</span><span class="loading-dot" style="animation-delay:0.2s">.</span><span class="loading-dot" style="animation-delay:0.4s">.</span>
      <br><span style="font-size:11px;">Fetching page and analysing for compliance risks</span>
    </div>
  </div>

  <!-- Results -->
  <div id="results">
    <div id="errorMsg" class="error-msg" style="display:none;"></div>
    <div id="scoreRow" class="score-row">
      <div>
        <div id="scoreNum" class="score-num"></div>
        <div id="scoreLabel" class="score-label"></div>
        <div id="scoreSub" class="score-sub"></div>
      </div>
      <div id="ring" class="ring">
        <div id="ringInner" class="ring-inner"></div>
        <div class="ring-sub">/100</div>
      </div>
    </div>
    <div id="flagsContainer" class="flags"></div>
    <a id="viewFullLink" class="view-link" href="#" target="_blank">View full report →</a>
    <button class="btn btn-secondary" id="rescanBtn" style="margin-top: 8px;">Scan again</button>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
